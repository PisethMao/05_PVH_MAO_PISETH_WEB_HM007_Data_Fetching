name: Kubernetes Deployment
on:
  push:
    branches:
      - master
env:
  DOCKER_IMAGE: pisethmao/nextjs-data-fetching
  IMAGE_TAG: 1.0.0
  HELM_REPO: PisethMao/helm-with-argocd
  RELEASE_NAME: nextjs-app
  NAMESPACE: default
jobs:
  build:
    runs-on: ubuntu-latest
    environment: DOCKER_ENV
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
      - name: Build Docker image
        run: docker build -t $DOCKER_IMAGE:$IMAGE_TAG .
      - name: Push Docker image
        run: docker push $DOCKER_IMAGE:$IMAGE_TAG
      - name: Logout DockerHub
        run: docker logout
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: DOCKER_ENV
    steps:
      - name: Install yq command
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq
          yq --version
      - name: Clone ArgoCD Repository
        run: |
          git clone https://github.com/${{ env.HELM_REPO }} helm_repo
      - name: Update Helm Chart
        run: |
          cd helm_repo/nextjs-data-fetching
          echo "Update repository username/imagename"
          yq -i ".image.repository=\"${{ secrets.USERNAME }}/${{ env.DOCKER_IMAGE }}\"" values.yaml
          echo "Updating image tag"
          yq -i ".image.tag=\"${{ env.IMAGE_TAG }}\"" values.yaml
          cat values.yaml
      - name: Commit Changes
        run: |
          cd helm_repo
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"
          git add .
          git commit -m "Update helm image to ${{ env.IMAGE_TAG }}" || echo "No changes"
      - name: Push Changes
        run: |
          cd helm_repo
          git push https://${{ secrets.GIT_TOKEN }}@github.com/${{ env.HELM_REPO }}
      - name: Clean up
        run: |
          echo "Cleaning temporary files..."
          rm -rf helm_repo
          docker system prune -af || true
